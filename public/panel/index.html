<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f766e" />
    <meta name="description" content="Panel comercial de Costa Inteligente Proveedor" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <title>Costa Inteligente Proveedor</title>
  </head>
  <body>
    <div class="phone-shell">
      <aside id="drawer" class="drawer" aria-hidden="true">
        <div class="drawer-panel">
          <div class="drawer-head">
            <div class="brand-mark">CI</div>
            <h2>Costa Inteligente</h2>
            <p>Panel comercial</p>
          </div>
          <nav id="drawerNav" class="drawer-nav" aria-label="Navegacion lateral"></nav>
        </div>
      </aside>

      <div id="modalRoot" class="modal-root" aria-live="polite"></div>
      <div id="toast" class="toast" role="status" aria-live="polite"></div>
      <div id="offlineBanner" class="offline-banner" role="status" aria-live="polite">
        <span class="icon">wifi-off</span>
        <span>Sin conexión. Los datos guardados siguen disponibles.</span>
        <button type="button" data-action="retry-connection">Reintentar</button>
      </div>

      <header class="app-bar">
        <button id="menuButton" class="icon-button" type="button" aria-label="Abrir menu">
          <span class="icon">menu</span>
        </button>
        <h1 id="appTitle">Panel del proveedor</h1>
        <div class="app-actions">
          <button class="icon-button" type="button" data-go="support" aria-label="Soporte">
            <span class="icon">help</span>
          </button>
          <button class="icon-button" type="button" data-go="settings" aria-label="Ajustes">
            <span class="icon">settings</span>
          </button>
        </div>
      </header>

      <main id="app" class="app-view" tabindex="-1">
        <section class="splash-screen">
          <div class="brand-mark">CI</div>
          <h2>Costa Inteligente</h2>
          <p>Preparando panel comercial</p>
          <div class="splash-bar"><span></span></div>
        </section>
      </main>

      <nav id="bottomNav" class="bottom-nav" aria-label="Navegacion principal">
        <button type="button" data-go="dashboard">
          <span class="icon">dashboard</span>
          <span>Inicio</span>
        </button>
        <button type="button" data-go="config">
          <span class="icon">store</span>
          <span>Servicios</span>
        </button>
        <button type="button" data-go="reservations">
          <span class="icon">calendar-check</span>
          <span>Reservas</span>
        </button>
        <button type="button" data-go="calendar">
          <span class="icon">calendar</span>
          <span>Agenda</span>
        </button>
        <button type="button" data-go="settings">
          <span class="icon">settings</span>
          <span>Ajustes</span>
        </button>
      </nav>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
